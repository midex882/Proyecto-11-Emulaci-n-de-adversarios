services:
  firewall:
    build:
      context: ./docker/firewall
    container_name: p11-firewall
    hostname: p11-firewall
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      FIREWALL_MODE: detect
      WAN_NET: 172.30.10.0/24
      DMZ_NET: 172.30.20.0/24
      TARGET_IP: 172.30.20.10
    networks:
      wan:
        ipv4_address: 172.30.10.254
      dmz:
        ipv4_address: 172.30.20.254
    volumes:
      - firewall-logs:/var/log/suricata
      - project11-logs:/var/log/project11

  target:
    build:
      context: ./docker/target
    container_name: p11-target
    hostname: p11-target
    cap_add:
      - NET_ADMIN
    environment:
      WAN_NET: 172.30.10.0/24
      FIREWALL_DMZ_IP: 172.30.20.254
    networks:
      dmz:
        ipv4_address: 172.30.20.10
    depends_on:
      - firewall

  adversary:
    build:
      context: ./docker/adversary
    container_name: p11-adversary
    hostname: p11-adversary
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      TARGET_IP: 172.30.20.10
      FIREWALL_WAN_IP: 172.30.10.254
      DMZ_NET: 172.30.20.0/24
    networks:
      wan:
        ipv4_address: 172.30.10.10
    depends_on:
      - firewall
      - target
    command: ["sleep", "infinity"]

networks:
  wan:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.10.0/24
  dmz:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.20.0/24

volumes:
  firewall-logs:
  project11-logs:

